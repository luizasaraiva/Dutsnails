<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DutsNails Studio | Login</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="login-body">
  <div class="login-box">
    <div class="mini">Acesso privado</div>
    <h2>Duts Studio</h2>
    <p style="margin-bottom:20px;">Painel administrativo exclusivo.</p>
    <form id="loginForm">
      <input id="user" placeholder="Usuário" required>
      <input id="pass" type="password" placeholder="Senha" required>
      <div id="erro" class="error">Usuário ou senha inválidos.</div>
      <button class="btn gold" type="submit">Entrar</button>
      <a href="../index.html" class="btn light" style="text-align:center;">Voltar ao site</a>
    </form>
    <p style="font-size:12px;margin-top:18px;color:#999;">Usuário teste: duda | Senha teste: duts123</p>
  </div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user === "duda" && pass === "duts123"){
    localStorage.setItem("duts_admin_logado", "sim");
    window.location.href = "painel.html";
  } else {
    document.getElementById("erro").style.display = "block";
  }
});
</script>
</body>
</html>
