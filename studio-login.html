<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#b59a66">
  <title>Vellure Studio | Login</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css?v=20260717-2">
</head>
<body class="auth-body">
  <div class="auth-box">
    <div class="mini">Acesso privado</div>
    <h2>Vellure Studio</h2>
    <p style="margin-bottom:20px">Painel administrativo exclusivo.</p>

    <form id="adminLoginForm">
      <input id="user" type="email" autocomplete="email" placeholder="E-mail administrativo" required>
      <input id="pass" type="password" autocomplete="current-password" placeholder="Senha" required>
      <div id="erro" class="error" style="display:none" role="alert"></div>
      <button id="entrarAdmin" class="btn gold" type="submit">Entrar</button>
      <a href="index.html" class="btn light">Voltar ao site</a>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=20260717-2"></script>
  <script src="supabase-client.js?v=20260717-2"></script>
  <script src="auth.js?v=20260717-2"></script>
  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', window.adminLogin);
  </script>
</body>
</html>
