<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vellure Studio | Pagamento</title><link rel="stylesheet" href="style.css"><link rel="manifest" href="manifest.webmanifest"></head><body><main class="payment-return-page"><section class="payment-return-card"><div class="mini">MERCADO PAGO</div><div id="returnIcon" class="payment-return-icon">✓</div><h1 id="returnTitle">Verificando pagamento</h1><p id="returnText">Aguarde enquanto retornamos ao Vellure Studio.</p><div class="actions"><a class="btn gold" href="cliente-area.html">Minha área</a><a class="btn light" href="index.html">Voltar ao início</a></div><small>A confirmação definitiva é feita automaticamente pelo Mercado Pago.</small></section></main><script>const p=new URLSearchParams(location.search);const s=p.get('status');const t=document.getElementById('returnTitle'),x=document.getElementById('returnText'),i=document.getElementById('returnIcon');if(s==='approved'){t.textContent='Pagamento enviado';x.textContent='Recebemos o retorno do Mercado Pago. Assim que a confirmação for processada, seu agendamento aparecerá como confirmado.';i.textContent='✓'}else if(s==='pending'){t.textContent='Pagamento em análise';x.textContent='O Mercado Pago ainda está processando o pagamento. Você pode acompanhar pela sua área.';i.textContent='…'}else{t.textContent='Pagamento não concluído';x.textContent='O pagamento foi cancelado ou recusado. Você pode voltar ao agendamento e tentar novamente.';i.textContent='!'}</script></body></html>
