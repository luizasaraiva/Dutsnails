<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#f8f5ef">
  <title>Vellure Studio | Pagamento</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <main class="payment-return-page">
    <section class="payment-return-card">
      <div class="mini">MERCADO PAGO</div>
      <div id="returnIcon" class="payment-return-icon">…</div>
      <h1 id="returnTitle">Verificando pagamento</h1>
      <p id="returnText">Estamos consultando a confirmação segura do seu pagamento.</p>
      <div id="returnDetails" class="payment-return-details" hidden></div>

      <div class="actions">
        <a id="whatsappConfirmation" class="btn gold" href="#" target="_blank" rel="noopener" hidden>
          Enviar confirmação pelo WhatsApp
        </a>
        <a class="btn light" href="cliente-area.html">Minha área</a>
        <a class="btn light" href="index.html">Voltar ao início</a>
      </div>

      <small id="returnNote">A confirmação definitiva é feita automaticamente pelo Mercado Pago.</small>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-client.js"></script>
  <script>
    const WHATSAPP_VELLURE = '5511966818500';
    const params = new URLSearchParams(location.search);
    const ultimoAgendamento = JSON.parse(sessionStorage.getItem('vellure_ultimo_agendamento') || 'null');
    const paymentId = params.get('payment_id') || ultimoAgendamento?.paymentId || '';

    const title = document.getElementById('returnTitle');
    const text = document.getElementById('returnText');
    const icon = document.getElementById('returnIcon');
    const details = document.getElementById('returnDetails');
    const whatsappButton = document.getElementById('whatsappConfirmation');
    const returnNote = document.getElementById('returnNote');

    const money = value => Number(value || 0).toLocaleString('pt-BR', {
      style: 'currency',
      currency: 'BRL'
    });

    const dateTime = value => value
      ? new Date(value).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' })
      : '';

    const paymentKind = kind => kind === 'full' ? 'Pagamento total' : 'Sinal';

    function buildWhatsAppUrl(payment) {
      const appointment = payment?.appointment || {};
      const client = payment?.client || {};
      const local = ultimoAgendamento || {};
      const startsAt = appointment.startsAt ? new Date(appointment.startsAt) : null;

      const name = client.name || local.nome || 'Cliente';
      const service = appointment.serviceName || local.servico || 'Procedimento Vellure';
      const date = startsAt
        ? startsAt.toLocaleDateString('pt-BR')
        : (local.data ? local.data.split('-').reverse().join('/') : 'Não informada');
      const time = startsAt
        ? startsAt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
        : (local.horario || 'Não informado');
      const amount = money(payment?.amount ?? local.amount);
      const kind = paymentKind(payment?.kind || local.kind);
      const order = payment?.id || paymentId || local.paymentId || 'Não informado';

      const message = [
        'Olá, Vellure Studio! Meu agendamento foi realizado e o pagamento foi aprovado. ✨',
        '',
        `Nome: ${name}`,
        `Serviço: ${service}`,
        `Data: ${date}`,
        `Horário: ${time}`,
        `Pagamento: ${kind} — ${amount}`,
        'Status: Pagamento aprovado',
        `Pedido: ${order}`
      ].join('\n');

      return `https://wa.me/${WHATSAPP_VELLURE}?text=${encodeURIComponent(message)}`;
    }

    function show(state, payment) {
      const status = state || payment?.status || 'pending';
      const isPaid = status === 'paid';

      if (isPaid) {
        icon.textContent = '✓';
        title.textContent = 'Pagamento confirmado';
        text.textContent = 'Seu pagamento foi aprovado e o agendamento foi confirmado automaticamente.';
        whatsappButton.href = buildWhatsAppUrl(payment);
        whatsappButton.hidden = false;
        returnNote.textContent = 'Toque no botão acima para enviar os dados do pedido à Vellure pelo WhatsApp.';
      } else if (['failed', 'cancelled', 'failure'].includes(status)) {
        icon.textContent = '!';
        title.textContent = 'Pagamento não concluído';
        text.textContent = 'O pagamento foi recusado ou cancelado. Volte ao agendamento para tentar novamente.';
        whatsappButton.hidden = true;
      } else {
        icon.textContent = '…';
        title.textContent = 'Pagamento em processamento';
        text.textContent = 'O Mercado Pago ainda está processando. Esta página será atualizada automaticamente por alguns instantes.';
        whatsappButton.hidden = true;
      }

      if (payment) {
        details.hidden = false;
        details.innerHTML = `<p><b>${payment.appointment?.serviceName || 'Procedimento Vellure'}</b></p><p>${money(payment.amount)}${payment.appointment?.startsAt ? ` • ${dateTime(payment.appointment.startsAt)}` : ''}</p>`;
      }
    }

    async function check(attempt = 0) {
      if (!paymentId || !window.vellureDb) {
        show(params.get('status'));
        return;
      }

      try {
        const { data } = await window.vellureDb.client.auth.getSession();
        const token = data?.session?.access_token;
        if (!token) {
          show(params.get('status'));
          return;
        }

        const response = await fetch(`/api/payment-status?paymentId=${encodeURIComponent(paymentId)}`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const payment = await response.json();
        if (!response.ok) throw new Error(payment.error || 'Falha ao consultar');

        show(payment.status, payment);
        if (payment.status === 'pending' && attempt < 10) {
          setTimeout(() => check(attempt + 1), 3000);
        }
      } catch {
        show(params.get('status'));
      }
    }

    check();
  </script>
</body>
</html>
